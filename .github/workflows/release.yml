name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Determine the version tag for this build
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=Bus Seating Planner ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            DEV_TAG="v${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"
            echo "tag=${DEV_TAG}" >> "$GITHUB_OUTPUT"
            echo "release_name=Dev Build ${DEV_TAG}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # --- System dependencies (Linux) ---
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      # --- Rust ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- Node.js ---
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      # --- Python backend (PyInstaller) ---
      - uses: astral-sh/setup-uv@v5

      - name: Build Python backend sidecar
        shell: bash
        run: |
          uv sync
          uv pip install pyinstaller

          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi

          uv run pyinstaller \
            --onefile \
            --name backend \
            --add-data "app${SEP}app" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import app.main \
            --collect-submodules app \
            run_backend.py

          mkdir -p src-tauri/binaries
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp dist/backend.exe "src-tauri/binaries/backend-${{ matrix.target }}.exe"
          else
            cp dist/backend "src-tauri/binaries/backend-${{ matrix.target }}"
          fi

      # --- Build Tauri app and publish release ---
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: ${{ needs.version.outputs.release_name }}
          releaseBody: "Automated build from commit ${{ github.sha }}"
          releaseDraft: false
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}

  # Clean up old dev prereleases (keep last 5)
  cleanup:
    needs: [version, build]
    if: needs.version.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old dev releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,isPrerelease --limit 50 | \
            jq -r '.[] | select(.isPrerelease) | .tagName' | \
            grep '^v.*-dev\.' | \
            sort -t. -k4 -n -r | \
            tail -n +6 | \
            while read -r tag; do
              echo "Deleting old dev release: $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done
